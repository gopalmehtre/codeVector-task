<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Browser</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e8e9ec;
    --muted: #8b8f9a;
    --accent: #5b8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    white-space: nowrap;
  }
  select, button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
  }
  button {
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  #count { color: var(--muted); font-size: 13px; margin-left: auto; }
  main {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .card .cat {
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .card .name {
    font-size: 14px;
    margin: 6px 0 8px;
    line-height: 1.3;
  }
  .card .price {
    font-size: 16px;
    font-weight: 600;
  }
  .card .meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 8px;
  }
  .load-more {
    display: flex;
    justify-content: center;
    margin: 28px 0;
  }
  .load-more button {
    padding: 10px 24px;
  }
  #status { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>
  <header>
    <h1>Products</h1>
    <select id="category">
      <option value="">All categories</option>
    </select>
    <span id="count"></span>
  </header>
  <main>
    <div id="status">Loading...</div>
    <div class="grid" id="grid"></div>
    <div class="load-more" id="loadMoreWrap" style="display:none">
      <button id="loadMore">Load more</button>
    </div>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    const categorySelect = document.getElementById('category');
    const loadMoreBtn = document.getElementById('loadMore');
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    const countEl = document.getElementById('count');

    let cursor = null;
    let category = '';
    let totalShown = 0;
    let loading = false;

    const priceFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
    const dateFmt = (iso) => new Date(iso).toLocaleString();

    function cardHtml(p) {
      return `
        <div class="card">
          <div class="cat">${p.category}</div>
          <div class="name">${p.name}</div>
          <div class="price">${priceFmt.format(p.price)}</div>
          <div class="meta">Updated ${dateFmt(p.updated_at)}</div>
        </div>
      `;
    }

    async function loadCategories() {
      const res = await fetch('/categories');
      const { data } = await res.json();
      for (const c of data) {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        categorySelect.appendChild(opt);
      }
    }

    async function loadPage(reset) {
      if (loading) return;
      loading = true;
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading...';

      if (reset) {
        cursor = null;
        totalShown = 0;
        grid.innerHTML = '';
        status.style.display = 'block';
        status.textContent = 'Loading...';
      }

      const params = new URLSearchParams({ limit: '24' });
      if (category) params.set('category', category);
      if (cursor) params.set('cursor', cursor);

      const res = await fetch('/products?' + params.toString());
      const json = await res.json();

      status.style.display = 'none';
      grid.insertAdjacentHTML('beforeend', json.data.map(cardHtml).join(''));
      totalShown += json.data.length;
      countEl.textContent = totalShown + ' shown';

      cursor = json.nextCursor;
      loadMoreWrap.style.display = cursor ? 'flex' : 'none';
      if (!cursor && totalShown === 0) {
        status.style.display = 'block';
        status.textContent = 'No products found.';
      }

      loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = 'Load more';
      loading = false;
    }

    categorySelect.addEventListener('change', () => {
      category = categorySelect.value;
      loadPage(true);
    });

    loadMoreBtn.addEventListener('click', () => loadPage(false));

    loadCategories();
    loadPage(true);
  </script>
</body>
</html>
